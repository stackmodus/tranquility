<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- House roof -->
  <polygon points="100,20 40,70 160,70" fill="#d35400" stroke="#c0392b" stroke-width="2"/>
  <!-- House body -->
  <rect x="55" y="70" width="90" height="50" fill="#e67e22" rx="2"/>
  <!-- Windows -->
  <rect x="70" y="78" width="18" height="16" fill="#f39c12" rx="2"/>
  <rect x="112" y="78" width="18" height="16" fill="#f39c12" rx="2"/>
  <!-- Door -->
  <rect x="90" y="95" width="20" height="25" fill="#8B4513" rx="2"/>
  <!-- Person -->
  <circle cx="100" cy="140" r="10" fill="#4a7c59"/>
  <path d="M100,150 C85,155 80,175 85,185 L95,180 L100,190 L105,180 L115,185 C120,175 115,155 100,150Z" fill="#4a7c59"/>
  <!-- Left leaf -->
  <path d="M70,135 C50,120 45,145 65,155 C55,140 65,130 70,135Z" fill="#27ae60"/>
  <!-- Right leaf -->
  <path d="M130,135 C150,120 155,145 135,155 C145,140 135,130 130,135Z" fill="#27ae60"/>
  <!-- Text -->
  <text x="100" y="210" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="13" fill="#4a7c59" font-weight="600">Tranquility of Hope</text>
</svg>
